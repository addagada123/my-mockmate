<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MockMate VR | WebXR</title>
    <meta name="description" content="MockMate VR interview environment">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <div id="unity-canvas-container" style="width: 100%; height: 100%;">
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <button id="entervr" value="Enter VR" disabled>VR</button>
        <button id="enterar" value="Enter AR" disabled>AR</button>
        <div id="unity-webxr-link">Using <a href="https://github.com/De-Panther/unity-webxr-export" target="_blank" title="WebXR Export">WebXR Export</a></div>
        <div id="unity-build-title">MockMate VR</div>
      </div>
    </div>
    <script>
      var urlParams = new URLSearchParams(window.location.search);
      var BRIDGE_TOKEN = urlParams.get("bridge_token") || "";
      var API_BASE = urlParams.get("api_base") || "";
      var SESSION_ID = urlParams.get("session_id") || "";
      var STREAMING_ASSETS_URL = (urlParams.get("streaming_assets_url") || "StreamingAssets").replace(/\/+$/, "");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build3.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build3.data",
        frameworkUrl: buildUrl + "/Build3.framework.js",
        codeUrl: buildUrl + "/Build3.wasm",
        streamingAssetsUrl: STREAMING_ASSETS_URL,
        companyName: "MockMate",
        productName: "Build3",
        productVersion: "1.0",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var canvasContainer = document.querySelector("#unity-canvas-container");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var unityInstance = null;

      function notifyParent(status, detail) {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({
            source: "mockmate-vr",
            status: status,
            detail: detail || "",
          }, window.location.origin);
        }
      }

      function renderError(message) {
        var rendered = String(message || "Unknown VR loading error.");
        loadingBar.style.display = "block";
        loadingBar.innerHTML = '<div style="max-width:720px;padding:16px 18px;border:1px solid rgba(248,113,113,0.5);border-radius:12px;background:rgba(127,29,29,0.35);color:#fecaca;font-size:14px;line-height:1.5;white-space:pre-wrap;">' + rendered + '</div>';
        notifyParent("error", rendered);
        console.error("[MockMate VR]", rendered);
      }

      function setLoadingMessage(message) {
        notifyParent("loading", message);
      }

      window.addEventListener("error", function (event) {
        var runtimeMessage = (event && event.error && event.error.stack) || (event && event.message) || "Unexpected runtime error inside the VR page.";
        renderError(runtimeMessage);
      });

      window.addEventListener("unhandledrejection", function (event) {
        var reason = (event && event.reason && event.reason.stack) || (event && event.reason && event.reason.message) || String((event && event.reason) || "Unhandled promise rejection inside the VR page.");
        renderError(reason);
      });

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onerror = () => {
        renderError("Unable to load Unity loader: " + loaderUrl);
      };
      script.onload = () => {
        setLoadingMessage("Unity loader ready. Starting WebGL content...");
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
          setLoadingMessage("Loading VR environment... " + Math.round(progress * 100) + "%");
        }).then((instance) => {
          unityInstance = instance;
          loadingBar.style.display = "none";
          notifyParent("ready", "Unity WebGL content initialized.");
          if (fullscreenButton)
          {
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }

          if (BRIDGE_TOKEN) {
            setLoadingMessage("Unity loaded. Connecting to MockMate session...");
            unityInstance.SendMessage("MockmateVRBootstrap", "SetBridgeToken",
              JSON.stringify({
                bridge_token: BRIDGE_TOKEN,
                api_base: API_BASE,
                session_id: SESSION_ID
              })
            );
          } else {
            setLoadingMessage("Unity loaded. Waiting for VR session token.");
          }
        }).catch((message) => {
          renderError((message && message.stack) || (message && message.message) || message || "createUnityInstance failed");
        });
      };
      setLoadingMessage("Loading Unity WebGL loader...");
      document.body.appendChild(script);

      let enterARButton = document.getElementById('enterar');
      let enterVRButton = document.getElementById('entervr');

      document.addEventListener('onARSupportedCheck', function (event) {
        enterARButton.disabled = !event.detail.supported;
      }, false);
      document.addEventListener('onVRSupportedCheck', function (event) {
        enterVRButton.disabled = !event.detail.supported;
      }, false);

      enterARButton.addEventListener('click', function (event) {
        unityInstance.Module.WebXR.toggleAR();
      }, false);
      enterVRButton.addEventListener('click', function (event) {
        unityInstance.Module.WebXR.toggleVR();
      }, false);
    </script>
  </body>
</html>
