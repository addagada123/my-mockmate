<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MockMate VR | Interview Terminal</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      :root {
        --primary: #6366f1;
        --primary-glow: rgba(99, 102, 241, 0.4);
        --bg: #0f172a;
        --surface: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --text-dim: #94a3b8;
      }
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', -apple-system, sans-serif; }
      #unity-container { width: 100%; height: 100%; position: relative; }
      #unity-canvas { width: 100%; height: 100%; background: #231f20; display: block; }
      
      /* Loading Overlay */
      #unity-loading-bar { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; gap: 24px; transition: opacity 0.5s ease; }
      .loader-circle { width: 64px; height: 64px; border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; filter: drop-shadow(0 0 8px var(--primary-glow)); }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #unity-progress-bar-empty { width: 240px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
      #unity-progress-bar-full { width: 0%; height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 0.3s ease; box-shadow: 0 0 10px var(--primary-glow); }
      .loading-text { color: var(--text-dim); font-size: 14px; font-weight: 500; letter-spacing: 0.5px; }

      /* Footer / Controls */
      #unity-footer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; z-index: 5; background: var(--surface); padding: 8px 16px; border-radius: 99px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
      .control-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 16px; border-radius: 99px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
      .control-btn:hover:not(:disabled) { background: var(--primary); transform: translateY(-1px); border-color: transparent; }
      .control-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <div id="unity-canvas-container" style="width: 100%; height: 100%;">
        <canvas id="unity-canvas"></canvas>
      </div>
      
      <div id="unity-loading-bar">
        <div class="loader-circle"></div>
        <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
        <div class="loading-text">INITIALIZING QUANTUM BRIDGE...</div>
      </div>

      <div id="unity-footer">
        <button id="entervr" class="control-btn" disabled><span>🥽</span> Enter VR</button>
        <button id="enterar" class="control-btn" disabled><span>📱</span> Enter AR</button>
        <button id="unity-fullscreen-button" class="control-btn"><span>⛶</span> Fullscreen</button>
      </div>
    </div>

    <script>
      // ── Global State for Unity Plugins ──
      window._whisperData = window._whisperData || { chunks: [], recorder: null, apiBase: "", bridgeToken: "", language: "en", unityObjectName: "", unityMethodName: "" };
      window.WebGLWhisperState = window.WebGLWhisperState || window._whisperData;

      const DEFAULT_API_BASE = "https://mockmate-api-6dvm.onrender.com";
      const urlParams = new URLSearchParams(window.location.search);

      // ── FIX 1: Notify parent React frame immediately that loading has started ──
      // Without this, the React loading spinner never activates.
      const postStatus = (status, detail) => {
        if (window.parent !== window) {
          window.parent.postMessage({ source: "mockmate-vr", status, detail }, "*");
        }
      };
      postStatus("loading", "Initializing VR environment...");

      // ── Handle fallback token mapping for older plugins ──
      window._InitWhisperSTT = function(apiKey, language, objectName, methodName) {
        const state = window._whisperData;
        state.apiKey = apiKey;
        state.language = language;
        state.unityObjectName = objectName;
        state.unityMethodName = methodName;
        if (!state.apiBase) state.apiBase = (urlParams.get("api_base") || DEFAULT_API_BASE);
        if (!state.bridgeToken) state.bridgeToken = (urlParams.get("bridge_token") || apiKey);
      };

      // ── FIX 2: Check res.ok before parsing JSON to prevent sending error bodies as transcripts ──
      // Previously, a 429 response body {"detail":"..."} was parsed and data.text was undefined,
      // sending an empty string or causing the error branch to fire with confusing messages.
      window._SendToWhisper = function(blob) {
        const state = window._whisperData;
        const token = state.bridgeToken || urlParams.get("bridge_token");
        const apiBase = (state.apiBase || urlParams.get("api_base") || DEFAULT_API_BASE).replace(/\/$/, "");
        const objectName = state.unityObjectName || "WebGLWhisperSTT";
        const methodName = state.unityMethodName || "OnTranscriptionReceived";

        const formData = new FormData();
        formData.append("file", blob, "recording.wav");
        let url = `${apiBase}/vr-bridge/transcribe?bridge_token=${encodeURIComponent(token)}`;
        if (state.language) url += `&language=${encodeURIComponent(state.language)}`;

        fetch(url, { method: "POST", body: formData })
          .then(res => {
            // FIX: check HTTP status before parsing body
            if (!res.ok) {
              throw new Error(`Proxy error: ${res.status}`);
            }
            return res.json();
          })
          .then(data => {
            const text = (data.text || "").trim();
            // Only send to Unity if we got actual transcribed text
            if (window.unityInstance && text) {
              window.unityInstance.SendMessage(objectName, methodName, text);
            }
          })
          .catch(err => {
            // Log the error but do NOT send "ERROR:..." to Unity as it
            // would be treated as a transcript answer, causing 409 conflicts.
            console.warn("[VR-STT] Transcription failed (will retry on next speech):", err.message);
          });
      };
      
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/Build7.loader.js";
      const config = {
        dataUrl: buildUrl + "/Build7.data",
        frameworkUrl: buildUrl + "/Build7.framework.js",
        codeUrl: buildUrl + "/Build7.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Build7",
        productVersion: "9.2.1",
      };

      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const enterVRButton = document.getElementById('entervr');
      const enterARButton = document.getElementById('enterar');
      let unityInstance = null;

      // ── Native Web Speech Fallback ──
      window._nativeSpeech = { synth: window.speechSynthesis, isSpeaking: false };
      window.speakNative = function(text, objectName) {
        const synth = window._nativeSpeech.synth;
        if (!synth) {
          // No speech synthesis support — notify Unity immediately so it doesn't hang
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakEnd");
          return;
        }
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        window._nativeSpeech.currentUtterance = utterance; // Prevent garbage collection bug
        utterance.rate = 1.1; // Restored to match original JSLib preference
        utterance.pitch = 1.0;
        utterance.onstart = () => {
          window._nativeSpeech.isSpeaking = true;
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakStart");
        };
        utterance.onend = () => {
          window._nativeSpeech.isSpeaking = false;
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakEnd");
        };
        // ── FIX 3: Add onerror handler so Unity is never left hanging ──
        utterance.onerror = (e) => {
          console.warn("[VR-TTS] SpeechSynthesis error:", e.error);
          window._nativeSpeech.isSpeaking = false;
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakEnd");
        };
        synth.speak(utterance);
      };

      window.startNativeSTT = function(objectName) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;
        const rec = new SpeechRecognition();
        rec.lang = 'en-US'; // Restored to match original JSLib
        rec.continuous = false;
        rec.interimResults = false;
        rec.maxAlternatives = 1; // Restored to match original JSLib
        rec.onresult = (e) => {
          if (unityInstance) {
            unityInstance.SendMessage(objectName, 'OnTranscriptChunkReceived', e.results[0][0].transcript);
          }
        };
        rec.onerror = (e) => console.warn("[VR-NativeSTT] Error:", e.error);
        rec.start();
      };

      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) config.devicePixelRatio = 1;
        postStatus("loading", "Unity runtime is loading, please wait...");
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((instance) => {
          unityInstance = instance;
          window.unityInstance = instance;
          loadingBar.style.opacity = "0";
          setTimeout(() => loadingBar.style.display = "none", 500);

          if (fullscreenButton) fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);

          // Inject bridge data into Unity
          const payload = { 
            bridge_token: urlParams.get("bridge_token") || "", 
            api_base: urlParams.get("api_base") || DEFAULT_API_BASE, 
            session_id: urlParams.get("session_id") || ""
          };
          unityInstance.SendMessage("MockmateVRBootstrap", "SetBridgeToken", JSON.stringify(payload));
          postStatus("ready", "Virtual environment synchronized.");
        }).catch((err) => {
          postStatus("error", "Failed to launch VR runtime: " + err);
        });
      };

      // ── FIX 4: Add script.onerror so React is notified if Build7.loader.js is missing ──
      // Without this, a 404 on the loader file shows a blank screen with no user feedback.
      script.onerror = () => {
        postStatus("error", "Failed to load VR assets (Build7.loader.js not found). Please check that the Build folder is deployed correctly.");
      };

      document.body.appendChild(script);

      // WebXR button wiring
      document.addEventListener('onARSupportedCheck', (e) => { if (enterARButton) enterARButton.disabled = !e.detail.supported; }, false);
      document.addEventListener('onVRSupportedCheck', (e) => { if (enterVRButton) enterVRButton.disabled = !e.detail.supported; }, false);
      if (enterVRButton) enterVRButton.onclick = () => { if (unityInstance?.Module?.WebXR) unityInstance.Module.WebXR.toggleVR(); };
      if (enterARButton) enterARButton.onclick = () => { if (unityInstance?.Module?.WebXR) unityInstance.Module.WebXR.toggleAR(); };

      // ── FIX 5: Resume AudioContext correctly ──
      // Old code created & immediately closed a NEW AudioContext which did nothing useful.
      // Unity's AudioContext is created internally — we just need to trigger resumption
      // on the first user interaction (required by browser autoplay policy).
      const resumeAudio = () => {
        // Attempt to resume any suspended AudioContext instances
        if (window.AudioContext || window.webkitAudioContext) {
          // Unity manages its own AudioContext; a user gesture is all that's needed.
          // We also try to resume any globally accessible context.
          if (unityInstance && unityInstance.Module && unityInstance.Module.ctx) {
            const ctx = unityInstance.Module.ctx;
            if (ctx.state === "suspended") ctx.resume();
          }
        }
        document.removeEventListener("click", resumeAudio);
        document.removeEventListener("keydown", resumeAudio);
        document.removeEventListener("touchstart", resumeAudio);
      };
      document.addEventListener("click", resumeAudio);
      document.addEventListener("keydown", resumeAudio);
      document.addEventListener("touchstart", resumeAudio, { passive: true });
    </script>
  </body>
</html>
