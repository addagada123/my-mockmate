<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Build7</title>
    <meta name="description" content="">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <div id="unity-canvas-container" style="width: 100%; height: 100%;">
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button" title="Fullscreen"></div>
        <button id="entervr" value="Enter VR" disabled>VR</button>
        <button id="enterar" value="Enter AR" disabled>AR</button>
        <div id="unity-webxr-link">Using <a href="https://github.com/De-Panther/unity-webxr-export" target="_blank" title="WebXR Export">WebXR Export</a></div>
        <div id="unity-build-title">Build7</div>
      </div>
    </div>
    <script>
      // --- WebGL Console Silence (INVALID_ENUM Fix) ---
      (function() {
        if (typeof WebGL2RenderingContext !== 'undefined' && WebGL2RenderingContext.prototype.getInternalformatParameter) {
          const original = WebGL2RenderingContext.prototype.getInternalformatParameter;
          WebGL2RenderingContext.prototype.getInternalformatParameter = function(target, internalformat, pname) {
            // Suppress GL_DEPTH_STENCIL queries that cause INVALID_ENUM on some browsers
            if (internalformat === 0x84F9) return 0; 
            return original.apply(this, arguments);
          };
        }
      })();

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build7.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build7.data",
        frameworkUrl: buildUrl + "/Build7.framework.js",
        codeUrl: buildUrl + "/Build7.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Build7",
        productVersion: "9.2.1",
        autoSyncPersistentDataPath: true,
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var canvasContainer = document.querySelector("#unity-canvas-container");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var unityInstance = null;
      var bootstrapPayloadDelivered = false;

      function notifyParent(type, detail) {
        if (window.parent) {
          window.parent.postMessage({ source: "mockmate-vr", type: type, detail: detail || null }, "*");
        }
      }

      function deliverBootstrapPayload(payload) {
        if (!unityInstance || !payload || bootstrapPayloadDelivered) return;

        try {
          unityInstance.SendMessage("MockmateVRBootstrap", "SetBridgeToken", payload);
          bootstrapPayloadDelivered = true;
          console.log("[Mockmate-Bridge] Bootstrap payload sent to Unity.");
          notifyParent("vr_bootstrap_sent", null);
        } catch (bootstrapError) {
          console.error("[Mockmate-Bridge] Failed to send bootstrap payload:", bootstrapError);
          notifyParent("vr_bootstrap_error", String(bootstrapError));
        }
      }
      

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        notifyParent("vr_loading", "Unity loader script loaded. Starting runtime...");
        const urlParams = new URLSearchParams(window.location.search);
        const bridge_token = urlParams.get('bridge_token');
        const api_base = urlParams.get('api_base');
        const session_id = urlParams.get('session_id');
        const streaming_assets_url = urlParams.get('streaming_assets_url');

        if (streaming_assets_url) {
          config.streamingAssetsUrl = streaming_assets_url.replace(/\/+$/, "");
          console.log("[Mockmate-Bridge] Using custom StreamingAssets URL:", config.streamingAssetsUrl);
        }

        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((instance) => {
          unityInstance = instance;
          loadingBar.style.display = "none";
          notifyParent("vr_unity_loaded", null);

          if (bridge_token) {
            console.log("[Mockmate-Bridge] Injecting credentials from URL into Unity...");
            const payload = JSON.stringify({
              bridge_token: bridge_token,
              api_base: api_base || "",
              session_id: session_id || ""
            });
            deliverBootstrapPayload(payload);
          }

          if (fullscreenButton)
          {
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }
        }).catch((message) => {
          notifyParent("vr_runtime_error", String(message));
          alert(message);
        });
      };
      document.body.appendChild(script);

      let enterARButton = document.getElementById('enterar');
      let enterVRButton = document.getElementById('entervr');

      document.addEventListener('onARSupportedCheck', function (event) {
        enterARButton.disabled = !event.detail.supported;
      }, false);
      document.addEventListener('onVRSupportedCheck', function (event) {
        enterVRButton.disabled = !event.detail.supported;
      }, false);

      enterARButton.addEventListener('click', function (event) {
        unityInstance.Module.WebXR.toggleAR();
      }, false);
      enterVRButton.addEventListener('click', function (event) {
        unityInstance.Module.WebXR.toggleVR();
      }, false);

      // --- Mockmate VR Bridge Logic (Re-implemented after Unity Build Overwrite) ---

      window.speakNative = function(text, objectName) {
        console.log("[Mockmate-Bridge] speakNative called:", text);
        if (!window.speechSynthesis) {
          console.warn("[Mockmate-Bridge] SpeechSynthesis not supported.");
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakEnd");
          return;
        }
        window.speechSynthesis.cancel(); 
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.onstart = function() {
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakStart");
        };
        utterance.onend = function() {
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakEnd");
        };
        utterance.onerror = function(e) {
          console.error("[Mockmate-Bridge] TTS Error:", e);
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakEnd");
        };
        window.speechSynthesis.speak(utterance);
      };

      window.stopNativeSpeech = function() {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
      };

      window.onInterviewComplete = function() {
        console.log("[Mockmate-Bridge] onInterviewComplete triggered. Messaging parent.");
        if (window.parent) {
          window.parent.postMessage({ type: "vr_interview_complete" }, "*");
        }
      };

      var recognition = null;
      window.startNativeSTT = function(objectName) {
        console.log("[Mockmate-Bridge] StartSpeechToText called");
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          console.warn("[Mockmate-Bridge] SpeechRecognition not supported.");
          return;
        }
        if (recognition) recognition.stop();
        
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
          if (unityInstance) unityInstance.SendMessage(objectName, "OnListeningStart");
        };
        recognition.onresult = function(event) {
          for (var i = event.resultIndex; i < event.results.length; i += 1) {
            var result = event.results[i];
            if (!result || !result[0]) continue;
            var transcript = (result[0].transcript || "").trim();
            if (!transcript) continue;

            if (unityInstance) {
              if (result.isFinal) {
                console.log("[Mockmate-Bridge] STT Final Result:", transcript);
                unityInstance.SendMessage(objectName, "OnTranscriptionReceived", transcript);
              } else {
                unityInstance.SendMessage(objectName, "OnSpeechActivity", transcript);
              }
            }
          }
        };
        recognition.onerror = function(event) {
          console.error("[Mockmate-Bridge] STT Error:", event.error);
          if (unityInstance) unityInstance.SendMessage(objectName, "OnListeningEnd");
        };
        recognition.onend = function() {
          if (unityInstance) unityInstance.SendMessage(objectName, "OnListeningEnd");
        };
        recognition.start();
      };

      window.stopNativeSTT = function() {
        if (recognition) recognition.stop();
      };
    </script>
  </body>
</html>
