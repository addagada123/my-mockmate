<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MockMate VR | Interview Terminal</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      :root {
        --primary: #6366f1;
        --primary-glow: rgba(99, 102, 241, 0.4);
        --bg: #0f172a;
        --surface: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --text-dim: #94a3b8;
      }
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', -apple-system, sans-serif; }
      #unity-container { width: 100%; height: 100%; position: relative; }
      #unity-canvas { width: 100%; height: 100%; background: #231f20; display: block; }
      
      /* Loading Overlay */
      #unity-loading-bar { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; gap: 24px; transition: opacity 0.5s ease; }
      .loader-circle { width: 64px; height: 64px; border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; filter: drop-shadow(0 0 8px var(--primary-glow)); }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #unity-progress-bar-empty { width: 240px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
      #unity-progress-bar-full { width: 0%; height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 0.3s ease; box-shadow: 0 0 10px var(--primary-glow); }
      .loading-text { color: var(--text-dim); font-size: 14px; font-weight: 500; letter-spacing: 0.5px; }

      /* Footer / Controls */
      #unity-footer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; z-index: 5; background: var(--surface); padding: 8px 16px; border-radius: 99px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
      .control-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 16px; border-radius: 99px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
      .control-btn:hover:not(:disabled) { background: var(--primary); transform: translateY(-1px); border-color: transparent; }
      .control-btn:disabled { opacity: 0.3; cursor: not-allowed; }
      
      .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 4px; display: inline-block; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      
      <div id="unity-loading-bar">
        <div class="loader-circle"></div>
        <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
        <div class="loading-text">INITIALIZING QUANTUM BRIDGE...</div>
      </div>

      <div id="unity-footer">
        <button id="entervr" class="control-btn" disabled><span>🥽</span> Enter VR</button>
        <button id="enterar" class="control-btn" disabled><span>📱</span> Enter AR</button>
        <button id="unity-fullscreen-button" class="control-btn"><span>⛶</span> Fullscreen</button>
      </div>
    </div>

    <script>
      // ── Global State for Unity Plugins ──
      // Some versions of the WebGL Whisper plugin may expect these global objects.
      window._whisperData = window._whisperData || {
        chunks: [],
        recorder: null,
        apiBase: "",
        bridgeToken: "",
        language: "en",
        unityObjectName: "",
        unityMethodName: ""
      };
      window.WebGLWhisperState = window.WebGLWhisperState || window._whisperData;

      const DEFAULT_API_BASE = "https://mockmate-api-6dvm.onrender.com";

      // Handle URL parameters early for fallbacks
      const urlParams = new URLSearchParams(window.location.search);
      const urlBridgeToken = (urlParams.get("bridge_token") || "").trim();
      const urlApiBase = ((urlParams.get("api_base") || "").trim() || DEFAULT_API_BASE).replace(/\/$/, "");

      // Patch for older .jslib versions that call _InitWhisperSTT
      window._InitWhisperSTT = function(apiKey, language, objectName, methodName) {
        console.log("[VR-Bridge] _InitWhisperSTT patch called.");
        const state = window._whisperData;
        state.apiKey = UTF8ToString ? UTF8ToString(apiKey) : apiKey;
        state.language = UTF8ToString ? UTF8ToString(language) : language;
        state.unityObjectName = UTF8ToString ? UTF8ToString(objectName) : objectName;
        state.unityMethodName = UTF8ToString ? UTF8ToString(methodName) : methodName;
        
        // If apiBase or bridgeToken is missing in the call, use URL params as fallback
        if (!state.apiBase) state.apiBase = urlApiBase;
        if (!state.bridgeToken) state.bridgeToken = urlBridgeToken || state.apiKey;
        
        console.log("[VR-Bridge] _whisperData populated:", state);
      };

      // Patch for older .jslib versions that call _SendToWhisper
      window._SendToWhisper = function(blob) {
        console.log("[VR-Bridge] _SendToWhisper called with blob:", blob);
        const state = window._whisperData;
        
        // Handle both naming styles and prioritize URL params if state is empty
        const token = state.bridgeToken || state.apiKey || urlBridgeToken;
        const apiBase = state.apiBase || urlApiBase || window.apiBase || DEFAULT_API_BASE;

        if (!token) {
          console.error("[VR-Bridge] Cannot send to Whisper: Bridge Token (or apiKey) missing.");
          return;
        }

        const formData = new FormData();
        formData.append("file", blob, "recording.wav");
        
        const base = apiBase ? apiBase.replace(/\/$/, "") : "";
        let url = `${base}/vr-bridge/transcribe?bridge_token=${encodeURIComponent(token)}`;
        if (state.language) url += `&language=${encodeURIComponent(state.language)}`;

        console.log("[VR-Bridge] Transcribing at:", url);

        fetch(url, { method: "POST", body: formData })
          .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
          })
          .then(data => {
            console.log("[VR-Bridge] Transcription success:", data);
            const objName = state.unityObjectName || "WebGLWhisperSTT";
            const methodName = state.unityMethodName || "OnTranscriptionReceived";
            if (unityInstance) {
              unityInstance.SendMessage(objName, methodName, data.text || "");
            }
          })
          .catch(err => {
            console.error("[VR-Bridge] Transcription error:", err);
            const objName = state.unityObjectName || "WebGLWhisperSTT";
            const methodName = state.unityMethodName || "OnTranscriptionReceived";
            if (unityInstance) {
              unityInstance.SendMessage(objName, methodName, "ERROR: " + err.message);
            }
          });
      };
      
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/Build7.loader.js";
      const config = {
        dataUrl: buildUrl + "/Build7.data",
        frameworkUrl: buildUrl + "/Build7.framework.js",
        codeUrl: buildUrl + "/Build7.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Build7",
        productVersion: "9.2.1",
      };

      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const enterVRButton = document.getElementById('entervr');
      const enterARButton = document.getElementById('enterar');
      let unityInstance = null;

      // ── Native Web Speech Fallback ──
      window._nativeSpeech = {
        synth: window.speechSynthesis,
        recognition: null,
        isSpeaking: false
      };

      window.speakNative = function(text, objectName) {
        if (!window._nativeSpeech.synth) {
          console.error("[WebSpeech] Speech Synthesis not supported.");
          return;
        }
        window._nativeSpeech.synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        
        utterance.onstart = () => {
          window._nativeSpeech.isSpeaking = true;
          console.log("[WebSpeech] Speaking started.");
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakStart");
        };
        
        utterance.onend = () => {
          window._nativeSpeech.isSpeaking = false;
          console.log("[WebSpeech] Speaking finished.");
          if (unityInstance) unityInstance.SendMessage(objectName, "OnSpeakEnd");
        };

        window._nativeSpeech.synth.speak(utterance);
      };

      window.startNativeSTT = function(objectName) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          console.error("[WebSpeech] Speech Recognition not supported.");
          if (unityInstance) unityInstance.SendMessage(objectName, "OnTranscriptionReceived", "ERROR: Speech Recognition not supported in this browser.");
          return;
        }

        if (window._nativeSpeech.recognition) window._nativeSpeech.recognition.stop();
        
        const rec = new SpeechRecognition();
        rec.lang = 'en-US';
        rec.interimResults = false;
        rec.maxAlternatives = 1;

        rec.onstart = () => console.log("[WebSpeech] Recognition started.");
        rec.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          console.log("[WebSpeech] Result:", transcript);
          if (unityInstance) unityInstance.SendMessage(objectName, 'OnTranscriptChunkReceived', transcript);
        };
        rec.onerror = (event) => {
          console.error("[WebSpeech] Recognition error:", event.error);
          if (unityInstance) unityInstance.SendMessage(objectName, "OnTranscriptionReceived", "ERROR: " + event.error);
        };
        rec.onend = () => console.log("[WebSpeech] Recognition ended.");

        window._nativeSpeech.recognition = rec;
        rec.start();
      };

      // ── Enhanced URL Parameter Handling ──
      const bridgeToken = (urlParams.get("bridge_token") || "").trim();
      const apiBase = ((urlParams.get("api_base") || "").trim() || DEFAULT_API_BASE).replace(/\/$/, "");
      const sessionId = (urlParams.get("session_id") || "").trim();
      const customStreamingAssets = urlParams.get("streaming_assets_url");

      if (customStreamingAssets) {
        config.streamingAssetsUrl = customStreamingAssets;
        console.log("[VR-Bridge] Using custom StreamingAssets URL:", config.streamingAssetsUrl);
      }

      console.log("[VR-Bridge] Bridge parameters initialized.");

      // Post status to parent
      const postStatus = (status, detail) => {
        if (window.parent !== window) {
          window.parent.postMessage({ source: "mockmate-vr", status, detail }, "*");
        }
      };

      postStatus("loading", "Initializing Unity runtime...");

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        // --- Added for Unity 6 + WebXR consistency ---
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          config.devicePixelRatio = 1;
        }

        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
          if (progress < 1) postStatus("loading", `Loading VR assets... ${Math.round(progress * 100)}%`);
        }).then((instance) => {
          unityInstance = instance;
          window.unityInstance = instance;
          console.log("[VR-Bridge] Unity Instance loaded successfully.");
          
          loadingBar.style.opacity = "0";
          setTimeout(() => loadingBar.style.display = "none", 500);

          if (fullscreenButton) {
            fullscreenButton.onclick = () => {
              if (unityInstance) unityInstance.SetFullscreen(1);
              else console.error("[VR-Bridge] Cannot toggle fullscreen: unityInstance not found.");
            };
          }

          // ── Bridge Data Injection ──
          if (bridgeToken || apiBase) {
            const payload = { bridge_token: bridgeToken, api_base: apiBase, session_id: sessionId };
            console.log("[VR-Bridge] Injecting payload into Unity...");
            unityInstance.SendMessage("MockmateVRBootstrap", "SetBridgeToken", JSON.stringify(payload));
          } else {
            console.warn("[VR-Bridge] No bridge parameters to inject.");
          }

          postStatus("ready", "Virtual environment synchronized.");

        }).catch((err) => {
          console.error("[VR-Bridge] Load failure:", err);
          postStatus("error", "Failed to launch VR: " + err);
          alert("VR Load Error: " + err);
        });
      };
      
      script.onerror = () => postStatus("error", "Failed to load Unity loader script.");
      document.body.appendChild(script);

      // ── WebXR Listeners ──
      // Some templates use events, others use direct Module access
      document.addEventListener('onARSupportedCheck', (e) => {
        console.log("[VR-Bridge] AR Support Check:", e.detail.supported);
        if (enterARButton) enterARButton.disabled = !e.detail.supported;
      });
      document.addEventListener('onVRSupportedCheck', (e) => {
        console.log("[VR-Bridge] VR Support Check:", e.detail.supported);
        if (enterVRButton) enterVRButton.disabled = !e.detail.supported;
      });

      if (enterVRButton) {
        enterVRButton.onclick = () => {
          if (unityInstance && unityInstance.Module && unityInstance.Module.WebXR) {
            unityInstance.Module.WebXR.toggleVR();
          } else {
            console.warn("[VR-Bridge] WebXR module not ready.");
            alert("VR initialization in progress, please wait...");
          }
        };
      }
      
      if (enterARButton) {
        enterARButton.onclick = () => {
          if (unityInstance && unityInstance.Module && unityInstance.Module.WebXR) {
            unityInstance.Module.WebXR.toggleAR();
          } else {
            console.warn("[VR-Bridge] WebXR module not ready.");
          }
        };
      }

      // ── Audio Context Fix ──
      const resumeAudio = () => {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) {
          const t = new Ctx();
          if (t.state === 'suspended') t.resume().then(() => t.close());
        }
        document.removeEventListener('click', resumeAudio);
      };
      document.addEventListener('click', resumeAudio);
    </script>
  </body>
</html>
