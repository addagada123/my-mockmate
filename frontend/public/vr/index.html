<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Build5</title>
    <meta name="description" content="">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <div id="unity-canvas-container" style="width: 100%; height: 100%;">
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <button id="entervr" value="Enter VR" disabled>VR</button>
        <button id="enterar" value="Enter AR" disabled>AR</button>
        <div id="unity-webxr-link">Using <a href="https://github.com/De-Panther/unity-webxr-export" target="_blank" title="WebXR Export">WebXR Export</a></div>
        <div id="unity-build-title">Build5</div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build7.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build7.data",
        frameworkUrl: buildUrl + "/Build7.framework.js",
        codeUrl: buildUrl + "/Build7.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Build5",
        productVersion: "9.2.1",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var canvasContainer = document.querySelector("#unity-canvas-container");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var unityInstance = null;

      // ── Read VR Bridge parameters from URL ──
      var urlParams = new URLSearchParams(window.location.search);
      var bridgeToken = urlParams.get("bridge_token") || "";
      var apiBase = urlParams.get("api_base") || "";
      var sessionId = urlParams.get("session_id") || "";

      console.log("[VR-Bridge] URL params parsed:");
      console.log("[VR-Bridge]   bridge_token:", bridgeToken ? bridgeToken.substring(0, 8) + "..." : "(empty)");
      console.log("[VR-Bridge]   api_base:", apiBase || "(empty)");

      // Notify parent frame that we're loading
      if (window.parent !== window) {
        window.parent.postMessage({
          source: "mockmate-vr",
          status: "loading",
          detail: "Loading Unity WebGL runtime..."
        }, "*");
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
          
          // Notify parent of loading progress
          if (window.parent !== window && progress < 1) {
            window.parent.postMessage({
              source: "mockmate-vr",
              status: "loading",
              detail: "Loading VR assets... " + Math.round(progress * 100) + "%"
            }, "*");
          }
        }).then((instance) => {
          unityInstance = instance;
          loadingBar.style.display = "none";

          if (fullscreenButton) {
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }

          // ── VR Bridge Injection ──
          if (bridgeToken || apiBase) {
            var payload = {
              bridge_token: bridgeToken,
              api_base: apiBase,
              session_id: sessionId
            };
            var jsonString = JSON.stringify(payload);
            console.log("[VR-Bridge] Injecting JSON payload into Unity: MockmateVRBootstrap.SetBridgeToken");
            unityInstance.SendMessage("MockmateVRBootstrap", "SetBridgeToken", jsonString);
          }

          // Notify parent frame that Unity is ready
          if (window.parent !== window) {
            window.parent.postMessage({
              source: "mockmate-vr",
              status: "ready",
              detail: "Unity VR environment is ready."
            }, "*");
          }

        }).catch((message) => {
          console.error("[VR-Bridge] Unity failed to load:", message);
          if (window.parent !== window) {
            window.parent.postMessage({
              source: "mockmate-vr",
              status: "error",
              detail: "Unity failed to load: " + message
            }, "*");
          }
          alert(message);
        });
      };
      
      script.onerror = () => {
        console.error("[VR-Bridge] Failed to load Unity loader script:", loaderUrl);
      };

      document.body.appendChild(script);

      let enterARButton = document.getElementById('enterar');
      let enterVRButton = document.getElementById('entervr');

      document.addEventListener('onARSupportedCheck', function (event) {
        enterARButton.disabled = !event.detail.supported;
      }, false);
      document.addEventListener('onVRSupportedCheck', function (event) {
        enterVRButton.disabled = !event.detail.supported;
      }, false);

      enterARButton.addEventListener('click', function (event) {
        unityInstance.Module.WebXR.toggleAR();
      }, false);
      enterVRButton.addEventListener('click', function (event) {
        unityInstance.Module.WebXR.toggleVR();
      }, false);
    </script>
  </body>
</html>
