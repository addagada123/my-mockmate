services:
  # Backend API (FastAPI)
  - type: web
    name: mockmate-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGO_URI
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: google
      - key: GOOGLE_MODEL
        value: gemini-1.5-flash
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://mockmate.onrender.com,https://mockmate-frontend-7j29.onrender.com,https://my-mockmate.vercel.app,https://frontend-o6kcjs7hl-addagada123s-projects.vercel.app

  # Frontend (React static site)
  - type: web
    name: mockmate
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://mockmate-api-gna1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
